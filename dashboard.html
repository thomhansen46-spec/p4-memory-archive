<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P4 Risk Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>

<body style="background:black;color:white;font-family:Arial;">

<h2>P4 Abbott EU Risk Dashboard</h2>

<div id="chart" style="width:100%;height:500px;"></div>

<script>
window.onload = function() {
  console.log("DASHBOARD LOADED");

  fetch('/api/rpn')
    .then(res => res.json())
    .then(data => {
      console.log("DATA:", data);

      const chart = echarts.init(document.getElementById('chart'));

      chart.setOption({
        title: { text: 'RPN Risk', textStyle:{color:'white'} },
        xAxis: {
          type: 'category',
          data: data.map(d => d.device_name)
        },
        yAxis: { type: 'value' },
        series: [{
          data: data.map(d => d.rpn),
          type: 'bar'
        }]
      });
    })
    .catch(err => console.error(err));
};
</script>

</body>
</html>
